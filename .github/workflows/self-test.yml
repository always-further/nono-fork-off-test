name: Self-test
on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: always-further/nono-fork-off@main
        with:
          command: "bash -c 'echo sandbox-ok && env | grep -c NONO_PROXY_TOKEN || true'"
          allow: "."

      - name: Verify nono was installed
        run: nono --version
