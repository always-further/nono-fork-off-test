name: "Vulnerable workflow (protected by nono)"
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: always-further/nono-fork-off@main
        with:
          command: "bash ./scripts/run-from-fork.sh"
          allow: "."
          read: "/usr/local /etc"

      - name: Check sandbox support (Landlock availability)
        run: nono setup --check-only
